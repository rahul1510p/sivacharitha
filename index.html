<!DOCTYPE html>
<html>
<head>
    <title>Login Page</title>
    <style>
        body {
            font-family: Arial;
            background: #f0f0f0;
            text-align: center;
        }

        .login-box {
            width: 300px;
            padding: 20px;
            background: white;
            margin: 100px auto;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px;
        }

        button {
            padding: 10px 20px;
            background: blue;
            color: white;
            border: none;
            cursor: pointer;
        }

        .hidden {
            display: none;
        }

        img {
            width: 200px;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<div class="login-box" id="loginBox">
    <h2>Login</h2>
    <input type="text" id="username" placeholder="Username"><br>
    <input type="password" id="password" placeholder="Password"><br>
    <button onclick="login()">Login</button>
    <p id="error" style="color:red;"></p>
</div>

<div id="welcomeBox" class="hidden">
    <h2 id="welcomeText"></h2>
    <img src="photo.jpeg." alt="Image">
    <button id="button" onclick="content">Click Me</button>
</div>

<script>
    function login() {
        let user = document.getElementById("username").value;
        let pass = document.getElementById("password").value;

        // Your credentials
        let correctUser = "sivacharitha";
        let correctPass = "30032004";

        if (user === correctUser && pass === correctPass) {
            document.getElementById("loginBox").style.display = "none";
            document.getElementById("welcomeBox").classList.remove("hidden");

            // Your custom text
            document.getElementById("welcomeText").innerText = 
                "Wish you many more happy returns of the day Siva Charitha 🎉";
        } else {
            document.getElementById("error").innerText = "Invalid credentials!";
        }
       let rahul =  document.getElementById("button");
        function content(){
            rahul.innerText = 
                "I Love four days "summer" "winter" "spring" "autumn""
                "I Love Three days "yesterday" "today" "tomorrow""
                "I Love Two days "day" "night""
                "I Love One day "Everyday""
    }
    
</script>

</body>
</html>
